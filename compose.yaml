services:
  node1:
    build:
      context: .
      target: final
    networks: [raft-net]
    environment:
      - NODE_ID=1
      - PEERS=2,3,4,5
    ports:
      - "6381:6380"
      - "6391:6379"
  node2:
    build:
      context: .
      target: final
    networks: [raft-net]
    environment:
      - NODE_ID=2
      - PEERS=1,3,4,5
    ports:
      - "6382:6380"
      - "6392:6379"
  node3:
    build:
      context: .
      target: final
    networks: [raft-net]
    environment:
      - NODE_ID=3
      - PEERS=1,2,4,5
    ports:
      - "6383:6380"
      - "6393:6379"
  node4:
    build:
      context: .
      target: final
    networks: [raft-net]
    environment:
      - NODE_ID=4
      - PEERS=1,2,3,5
    ports:
      - "6384:6380"
      - "6394:6379"
  node5:
    build:
      context: .
      target: final
    networks: [raft-net]
    environment:
      - NODE_ID=5
      - PEERS=1,2,3,4
    ports:
      - "6385:6380"
      - "6395:6379"

networks:
  raft-net:
    driver: bridge