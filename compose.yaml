services:
  node1:
    build:
      context: ..
      dockerfile: redis/Dockerfile
      target: final
    networks: [raft-net]
    environment:
      - NODE_ID=1
      - PEERS=2,3,4,5
    ports:
      - "6381:6380"
      - "6391:6379"
  node2:
    build:
      context: ..
      dockerfile: redis/Dockerfile
      target: final
    networks: [raft-net]
    environment:
      - NODE_ID=2
      - PEERS=1,3,4,5
    ports:
      - "6382:6380"
      - "6392:6379"
  node3:
    build:
      context: ..
      dockerfile: redis/Dockerfile
      target: final
    networks: [raft-net]
    environment:
      - NODE_ID=3
      - PEERS=1,2,4,5
    ports:
      - "6383:6380"
      - "6393:6379"
  node4:
    build:
      context: ..
      dockerfile: redis/Dockerfile
      target: final
    networks: [raft-net]
    environment:
      - NODE_ID=4
      - PEERS=1,2,3,5
    ports:
      - "6384:6380"
      - "6394:6379"
  node5:
    build:
      context: ..
      dockerfile: redis/Dockerfile
      target: final
    networks: [raft-net]
    environment:
      - NODE_ID=5
      - PEERS=1,2,3,4
    ports:
      - "6385:6380"
      - "6395:6379"

  prometheus:
    image: prom/prometheus:latest
    networks: [raft-net]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    networks: [raft-net]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

networks:
  raft-net:
    driver: bridge